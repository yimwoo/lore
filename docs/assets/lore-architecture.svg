<svg width="680" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
<style>
  .label { font-size: 12px; fill: #656360; }
  .title { font-size: 14px; font-weight: 500; }
  .sub { font-size: 12px; }
  .arr { stroke-width: 1.2; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Section: Your projects -->
<text class="label" x="340" y="24" text-anchor="middle">Your projects</text>

<!-- Project boxes -->
<rect x="100" y="36" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="title" x="165" y="62" text-anchor="middle" fill="#444441">Project A</text>

<rect x="275" y="36" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="title" x="340" y="62" text-anchor="middle" fill="#444441">Project B</text>

<rect x="450" y="36" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="title" x="515" y="62" text-anchor="middle" fill="#444441">Project C</text>

<!-- Arrows: projects to memory -->
<line x1="165" y1="80" x2="165" y2="148" class="arr" stroke="#B4B2A9" marker-end="url(#arrow)"/>
<line x1="340" y1="80" x2="280" y2="148" class="arr" stroke="#B4B2A9" marker-end="url(#arrow)"/>
<line x1="340" y1="80" x2="400" y2="148" class="arr" stroke="#B4B2A9" marker-end="url(#arrow)"/>
<line x1="515" y1="80" x2="515" y2="148" class="arr" stroke="#B4B2A9" marker-end="url(#arrow)"/>

<!-- Section: Memory tiers -->
<text class="label" x="340" y="140" text-anchor="middle">Memory tiers</text>

<!-- Project memory -->
<rect x="52" y="152" width="256" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="title" x="180" y="182" text-anchor="middle" fill="#085041">Project memory</text>
<text class="sub" x="180" y="202" text-anchor="middle" fill="#0F6E56">Per-repo session context</text>

<!-- Shared knowledge -->
<rect x="372" y="152" width="256" height="80" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="title" x="500" y="182" text-anchor="middle" fill="#3C3489">Shared knowledge</text>
<text class="sub" x="500" y="202" text-anchor="middle" fill="#534AB7">Cross-project rules + decisions</text>

<!-- Promote arrow -->
<text class="label" x="340" y="180" text-anchor="middle">promote</text>
<line x1="308" y1="185" x2="370" y2="185" class="arr" stroke="#B4B2A9" marker-end="url(#arrow)"/>

<!-- Arrows: stores to delivery -->
<line x1="180" y1="232" x2="180" y2="290" class="arr" stroke="#5DCAA5" marker-end="url(#arrow)"/>
<path d="M430 232 L430 264 L82 264 L82 290" fill="none" class="arr" stroke="#AFA9EC" marker-end="url(#arrow)"/>
<path d="M470 232 L470 270 L245 270 L245 290" fill="none" class="arr" stroke="#AFA9EC" marker-end="url(#arrow)"/>
<line x1="520" y1="232" x2="420" y2="290" class="arr" stroke="#AFA9EC" marker-end="url(#arrow)"/>
<path d="M540 232 L540 276 L575 276 L575 290" fill="none" class="arr" stroke="#AFA9EC" marker-end="url(#arrow)"/>

<!-- Section: Delivery layers -->
<text class="label" x="340" y="284" text-anchor="middle">Delivery layers</text>

<!-- SessionStart -->
<rect x="28" y="294" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="title" x="93" y="314" text-anchor="middle" fill="#0C447C">SessionStart</text>
<text class="sub" x="93" y="334" text-anchor="middle" fill="#185FA5">Once per session</text>

<!-- Whisper -->
<rect x="184" y="294" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="title" x="249" y="314" text-anchor="middle" fill="#633806">Whisper</text>
<text class="sub" x="249" y="334" text-anchor="middle" fill="#854F0B">Before each prompt</text>

<!-- MCP Recall -->
<rect x="340" y="294" width="130" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="title" x="405" y="314" text-anchor="middle" fill="#712B13">MCP recall</text>
<text class="sub" x="405" y="334" text-anchor="middle" fill="#993C1D">On demand</text>

<!-- Hints -->
<rect x="496" y="294" width="130" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="title" x="561" y="314" text-anchor="middle" fill="#27500A">Hints</text>
<text class="sub" x="561" y="334" text-anchor="middle" fill="#3B6D11">Pre-turn advisory</text>

<!-- Arrows: delivery to agent -->
<line x1="93" y1="350" x2="270" y2="410" class="arr" stroke="#85B7EB" marker-end="url(#arrow)"/>
<line x1="249" y1="350" x2="310" y2="410" class="arr" stroke="#FAC775" marker-end="url(#arrow)"/>
<line x1="405" y1="350" x2="370" y2="410" class="arr" stroke="#F0997B" marker-end="url(#arrow)"/>
<line x1="561" y1="350" x2="410" y2="410" class="arr" stroke="#97C459" marker-end="url(#arrow)"/>

<!-- Codex Agent -->
<rect x="220" y="412" width="240" height="56" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="title" x="340" y="434" text-anchor="middle" fill="#3C3489">Codex agent</text>
<text class="sub" x="340" y="454" text-anchor="middle" fill="#534AB7">Responds with full context</text>

<!-- Output -->
<line x1="340" y1="468" x2="340" y2="498" class="arr" stroke="#AFA9EC" marker-end="url(#arrow)"/>
<text class="label" x="340" y="514" text-anchor="middle">Your answer, informed by Lore</text>

</svg>
